version: '3.8'

services:
  backend:
    build: .
    container_name: complexity-backend
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend/complexity-ui
    container_name: complexity-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/complexity-ui:/app
    environment:
      - VITE_API_URL=http://localhost:8000
    command: npm run dev -- --host

networks:
  default:
    name: complexity-network